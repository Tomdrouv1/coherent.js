name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'NPM dist-tag (beta, rc, or latest)'
        required: true
        type: choice
        options:
          - beta
          - rc
          - latest
        default: rc
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

env:
  PNPM_CONFIG_MINIMUM_RELEASE_AGE: "0"

jobs:
  publish:
    name: Publish packages to NPM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Determine npm tag
        id: npm-tag
        run: |
          # workflow_dispatch → use the user-selected dist-tag (validated by
          # the enum on `inputs.tag`).
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # release event → infer the dist-tag from the release tag name:
          #   v1.2.3-rc.N    → rc
          #   v1.2.3-beta.N  → beta
          #   any other -*   → beta (safe default for unknown pre-release labels)
          #   v1.2.3         → latest
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            case "$RELEASE_TAG" in
              *-rc.*|*-rc[0-9]*)   echo "tag=rc"   >> "$GITHUB_OUTPUT" ;;
              *-beta.*|*-beta[0-9]*) echo "tag=beta" >> "$GITHUB_OUTPUT" ;;
              *)                   echo "tag=beta" >> "$GITHUB_OUTPUT" ;;
            esac
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Publish to NPM
        run: |
          if [[ "$NPM_TAG" == "latest" ]]; then
            pnpm publish -r --provenance --access public --no-git-checks
          else
            pnpm publish -r --provenance --access public --tag "$NPM_TAG" --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ steps.npm-tag.outputs.tag }}

      - name: Summary
        run: |
          echo "Published all packages to NPM with tag: $NPM_TAG"
          echo "Packages published:"
          find packages -maxdepth 2 -name package.json -exec grep -m1 '"name":' {} \; | cut -d\" -f4
        env:
          NPM_TAG: ${{ steps.npm-tag.outputs.tag }}
