name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'NPM dist-tag (latest or beta)'
        required: true
        type: choice
        options:
          - beta
          - latest
        default: beta
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish packages to NPM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Determine npm tag
        id: npm-tag
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          elif [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}

      - name: Publish to NPM
        run: |
          if [[ "$NPM_TAG" == "latest" ]]; then
            pnpm publish -r --provenance --access public --no-git-checks
          else
            pnpm publish -r --provenance --access public --tag "$NPM_TAG" --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ steps.npm-tag.outputs.tag }}

      - name: Summary
        run: |
          echo "Published all packages to NPM with tag: $NPM_TAG"
          echo "Packages published:"
          find packages -maxdepth 2 -name package.json -exec grep -m1 '"name":' {} \; | cut -d\" -f4
        env:
          NPM_TAG: ${{ steps.npm-tag.outputs.tag }}
