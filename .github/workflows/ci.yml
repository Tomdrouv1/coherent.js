name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

permissions:
  contents: read

env:
  PNPM_CONFIG_MINIMUM_RELEASE_AGE: "0"

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [22.x, 24.x, 26.x]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup build cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache
            ./packages/*/dist
            ./website/dist
          key: ${{ runner.os }}-build-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-build-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Check API surface
        run: node scripts/check-api-surface.mjs --check

      - name: Validate package exports (publint)
        run: |
          for dir in packages/*/; do
            case "$dir" in *vscode-extension*) continue ;; esac
            # Skip directories without a manifest (e.g. dist remnants of
            # removed packages restored from the build cache).
            [ -f "$dir/package.json" ] || continue
            echo "── publint $dir"
            pnpm dlx publint "$dir" || exit 1
          done

      - name: Check bundle size
        run: node scripts/check-bundle-size.mjs --check

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Unit tests with coverage
        run: pnpm run test:coverage:ci
        env:
          CI: true

      - name: Generate coverage report
        run: pnpm run coverage:report

      - name: Upload coverage to Codecov
        if: matrix.node-version == '24.x'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true
          token: ${{secrets.CODECOV_TOKEN}}
        continue-on-error: true

      - name: Upload coverage artifacts
        if: matrix.node-version == '24.x'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage/
            coverage-summary.json

      - name: Build website (sanity check)
        run: pnpm run website:build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm run e2e:install

      - name: Install Playwright system deps only (when cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright tests
        run: pnpm run e2e
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  vsix:
    name: VSIX Build & Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package VS Code extension
        run: pnpm --filter coherent-language-support run package

      - name: Check VSIX publish-readiness
        run: node scripts/check-vsix.mjs

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: coherent-vscode-extension
          path: packages/vscode-extension/*.vsix
          retention-days: 30
